<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f0f4f8; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .error { color: red; text-align: center; padding: 50px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2c7da0; color: white; }
        .btn-danger { background: #c0392b; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; }
        select, button { padding: 8px; margin: 5px; }
        .admin-only { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Administration Panel</h1>
        <div id="message"></div>
        <div id="admin-content" class="admin-only">
            <h2>Tables</h2>
            <select id="table-select">
                <option value="users">Users</option>
                <option value="logs">Logs</option>
                <option value="files">Files</option>
                <option value="shares">Shares</option>
            </select>
            <button onclick="loadTableData()">Load</button>
            <div id="table-data"></div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        
        if (!token) {
            window.location.href = '/login-page';
        }
        
        if (role !== 'admin') {
            document.getElementById('message').innerHTML = '<div class="error"><h2>Accès refusé</h2><p>Vous devez être administrateur pour accéder à cette page.</p><a href="/dashboard">Retour au dashboard</a></div>';
        } else {
            document.getElementById('admin-content').style.display = 'block';
            loadStats();
        }
        
        async function apiCall(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                headers: {
                    ...options.headers,
                    'Authorization': 'Bearer ' + token
                }
            });
            if (!response.ok) throw new Error('Erreur ' + response.status);
            return response.json();
        }
        
        async function loadStats() {
            try {
                const data = await apiCall('/admin/api/stats');
                let html = '<h2>Statistiques</h2><table><tr><th>Table</th><th>Nombre</th></tr>';
                for (const [table, count] of Object.entries(data.counts)) {
                    html += `<tr><td>${table}</td><td>${count}</td></tr>`;
                }
                html += '</table>';
                document.getElementById('message').innerHTML = html;
            } catch(e) {
                document.getElementById('message').innerHTML = '<p class="error">Erreur chargement stats</p>';
            }
        }
        
        async function loadTableData() {
            const table = document.getElementById('table-select').value;
            try {
                const data = await apiCall(`/admin/api/table/${table}`);
                if (!data.data.length) {
                    document.getElementById('table-data').innerHTML = '<p>Aucune donnée</p>';
                    return;
                }
                let html = '<table><tr>';
                for (const col of data.columns) html += `<th>${col.name}</th>`;
                html += '<th>Action</th></tr>';
                for (const row of data.data) {
                    html += '<tr>';
                    for (const col of data.columns) {
                        let val = row[col.name];
                        if (val && val.length > 50) val = val.substring(0, 50) + '...';
                        html += `<td>${val || '-'}</td>`;
                    }
                    html += `<td><button class="btn-danger" onclick="deleteRecord('${table}', ${row.id})">Supprimer</button></td>`;
                    html += '</tr>';
                }
                html += '</table>';
                document.getElementById('table-data').innerHTML = html;
            } catch(e) {
                document.getElementById('table-data').innerHTML = '<p class="error">Erreur chargement</p>';
            }
        }
        
        async function deleteRecord(table, id) {
            if (!confirm(`Supprimer l'enregistrement ${id} ?`)) return;
            try {
                const response = await fetch(`/admin/api/table/${table}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await response.json();
                if (result.success) {
                    alert('Supprimé');
                    loadTableData();
                    loadStats();
                } else {
                    alert('Erreur: ' + result.error);
                }
            } catch(e) {
                alert('Erreur');
            }
        }
    </script>
</body>
</html>
