<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Editor - UEBA Cloud Storage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .toolbar {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .file-info { display: flex; align-items: center; gap: 16px; }
        .file-info h3 { color: #1a3a5c; font-weight: 500; font-size: 16px; }
        .btn-group { display: flex; gap: 12px; }
        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
        }
        .btn-save { background: #2c7da0; color: white; }
        .btn-save:hover { background: #1f5e7a; }
        .btn-close { background: #e2e8f0; color: #1a3a5c; }
        .btn-close:hover { background: #cbd5e0; }
        .status { color: #1e8449; font-size: 12px; }
        .editor-container { flex: 1; padding: 20px; background: #f8fafc; }
        textarea {
            width: 100%;
            height: 100%;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: white;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.1); }
        .shortcut-hint {
            background: #f8fafc;
            padding: 8px 20px;
            font-size: 11px;
            color: #6c86a0;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="file-info">
            <h3 id="filename"></h3>
            <span class="status" id="status"></span>
        </div>
        <div class="btn-group">
            <button class="btn btn-save" onclick="saveFile()">Save</button>
            <button class="btn btn-close" onclick="closeEditor()">Close</button>
        </div>
    </div>
    <div class="editor-container">
        <textarea id="editor" placeholder="Start typing..."></textarea>
    </div>
    <div class="shortcut-hint">Press Ctrl + S to save</div>
    <script>
        const token = localStorage.getItem('token');
        const filename = window.location.pathname.split('/').pop();
        if (!token) { window.location.href = '/login-page'; }
        document.getElementById('filename').innerText = filename;
        async function loadFile() {
            try {
                const response = await fetch(`/files/view/${filename}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('editor').value = data.content || '';
                } else if (response.status === 404) {
                    document.getElementById('editor').value = '';
                } else { alert('Error loading file'); }
            } catch (error) { console.error('Error:', error); alert('Error loading file'); }
        }
        async function saveFile() {
            const content = document.getElementById('editor').value;
            const formData = new FormData();
            formData.append('content', content);
            try {
                const response = await fetch(`/files/edit/${filename}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                if (response.ok) {
                    const status = document.getElementById('status');
                    status.innerText = 'Saved at ' + new Date().toLocaleTimeString();
                    setTimeout(() => { status.innerText = ''; }, 2000);
                } else { alert('Error saving file'); }
            } catch (error) { console.error('Error:', error); alert('Error saving file'); }
        }
        function closeEditor() { window.location.href = '/dashboard'; }
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveFile(); }
        });
        loadFile();
    </script>
</body>
</html>
