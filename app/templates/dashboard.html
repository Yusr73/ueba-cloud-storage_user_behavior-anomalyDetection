<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEBA · Cloud Storage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f7;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #0a1c2a;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: #ffffff;
            border-bottom: 2px solid #dce5ec;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #1a5a7a, #2c7da0);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .logo-icon span {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .logo-text .primary {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1a5a7a;
            letter-spacing: -0.3px;
        }

        .logo-text .secondary {
            font-size: 0.6rem;
            font-weight: 600;
            color: #8aaec2;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f0f4f8;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
            border-radius: 2rem;
            border: 1px solid #dce5ec;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1a5a7a;
        }

        .btn-logout {
            background: #e2edf2;
            border: none;
            border-radius: 2rem;
            padding: 0.45rem 1.3rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a5a7a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #d0e0e8;
            transform: translateY(-1px);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Cards */
        .card {
            background: #ffffff;
            border: 1px solid #dce5ec;
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #8aaec2;
            margin-bottom: 1.25rem;
        }

        .upload-area {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="file"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #dce5ec;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: #1a5a7a;
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 0.7rem 1.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #2c7da0;
            transform: translateY(-1px);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #dce5ec;
            padding-bottom: 0.5rem;
        }

        .tab {
            background: none;
            border: none;
            padding: 0.5rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #8aaec2;
            cursor: pointer;
            border-radius: 2rem;
            transition: all 0.2s;
        }

        .tab:hover {
            color: #1a5a7a;
            background: #f0f6fa;
        }

        .tab.active {
            color: #1a5a7a;
            background: #f0f6fa;
        }

        /* File list */
        .file-list {
            background: #ffffff;
            border: 1px solid #dce5ec;
            border-radius: 1.25rem;
            overflow-x: auto;
        }

        .file-header {
            display: grid;
            grid-template-columns: minmax(200px, 3fr) minmax(80px, 1fr) minmax(420px, 2.5fr);
            background: #f8fafc;
            padding: 0.9rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #5e7e96;
            border-bottom: 1px solid #dce5ec;
            gap: 1rem;
        }

        .file-item {
            display: grid;
            grid-template-columns: minmax(200px, 3fr) minmax(80px, 1fr) minmax(420px, 2.5fr);
            padding: 0.9rem 1.5rem;
            align-items: center;
            border-bottom: 1px solid #eef2f7;
            transition: background 0.2s;
            gap: 1rem;
        }

        .file-item:hover {
            background: #fafcfd;
        }

        .file-name {
            color: #1a5a7a;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            word-break: break-word;
        }

        .file-name:hover {
            text-decoration: underline;
        }

        .file-size {
            font-size: 0.8rem;
            color: #8aaec2;
            font-weight: 500;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 0.2rem;
        }

        .btn-action {
            padding: 0.35rem 0.9rem;
            border: none;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-view { background: #e8f0f5; color: #1a5a7a; }
        .btn-edit { background: #fef3e0; color: #c9771e; }
        .btn-download { background: #e0f0ea; color: #2a7a5c; }
        .btn-share { background: #e3edf8; color: #2a6d9c; }
        .btn-rename { background: #efe5f8; color: #6b3d8c; }
        .btn-delete { background: #fee6e3; color: #b33c2a; }
        .btn-restore { background: #e8f0f5; color: #1a5a7a; }

        .btn-action:hover {
            transform: translateY(-1px);
            filter: brightness(0.96);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            font-size: 0.85rem;
            color: #a9c0cf;
            font-weight: 500;
        }

        .rename-input {
            padding: 0.35rem 0.8rem;
            border: 1.5px solid #1a5a7a;
            border-radius: 1.5rem;
            font-size: 0.75rem;
            margin-right: 0.3rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }

        .rename-confirm {
            background: #1a5a7a;
            color: white;
            padding: 0.35rem 0.9rem;
            border: none;
            border-radius: 1.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .rename-cancel {
            background: #eef3f7;
            color: #1a5a7a;
            padding: 0.35rem 0.9rem;
            border: 1px solid #dce5ec;
            border-radius: 1.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .file-header, .file-item {
                grid-template-columns: minmax(180px, 2fr) minmax(70px, 0.8fr) minmax(320px, 2fr);
            }
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .file-header, .file-item {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
            .file-actions {
                flex-wrap: wrap;
            }
            .upload-area { flex-direction: column; }
            input[type="file"] { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon"><span>☁</span></div>
                <div class="logo-text">
                    <div class="primary">UEBA</div>
                    <div class="secondary">cloud storage</div>
                </div>
            </div>
            <div class="user-info">
                <span class="user-name" id="username"></span>
                <button class="btn-logout" onclick="logout()">Sign out</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">Upload files</div>
            <div class="upload-area">
                <input type="file" id="fileInput" multiple>
                <button class="btn-primary" onclick="uploadFiles()">Upload</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('files')">My files</button>
            <button class="tab" onclick="showTab('trash')">Trash</button>
        </div>

        <div id="files-tab">
            <div class="file-list">
                <div class="file-header">
                    <span>File name</span>
                    <span>Size</span>
                    <span>Actions</span>
                </div>
                <div id="files-container"></div>
            </div>
        </div>

        <div id="trash-tab" style="display:none;">
            <div class="file-list">
                <div class="file-header">
                    <span>File name</span>
                    <span>Size</span>
                    <span>Actions</span>
                </div>
                <div id="trash-container"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login-page';
        document.getElementById('username').innerText = localStorage.getItem('user') || 'User';

        async function apiCall(url, options = {}) {
            const r = await fetch(url, {
                ...options,
                headers: { ...options.headers, 'Authorization': 'Bearer ' + token }
            });
            if (r.status === 401 || r.status === 403) {
                localStorage.removeItem('token');
                window.location.href = '/login-page';
                throw new Error('Unauthorized');
            }
            return r;
        }

        async function loadFiles() {
            try {
                const r = await apiCall('/files/list');
                const files = await r.json();
                const container = document.getElementById('files-container');
                if (files.length === 0) { container.innerHTML = '<div class="empty-state">No files uploaded yet</div>'; return; }
                container.innerHTML = files.map(f => `
                    <div class="file-item" id="file-item-${escapeHtml(f.name)}">
                        <div class="file-name" onclick="viewFile('${escapeHtml(f.name)}')">${escapeHtml(f.name)}</div>
                        <div class="file-size">${formatFileSize(f.size)}</div>
                        <div class="file-actions" id="actions-${escapeHtml(f.name)}">
                            <button class="btn-action btn-view" onclick="viewFile('${escapeHtml(f.name)}')">View</button>
                            <button class="btn-action btn-edit" onclick="editFile('${escapeHtml(f.name)}')">Edit</button>
                            <button class="btn-action btn-download" onclick="downloadFile('${escapeHtml(f.name)}')">Download</button>
                            <button class="btn-action btn-rename" onclick="showRenameInput('${escapeHtml(f.name)}')">Rename</button>
                            <button class="btn-action btn-share" onclick="shareFile('${escapeHtml(f.name)}')">Share</button>
                            <button class="btn-action btn-delete" onclick="deleteFile('${escapeHtml(f.name)}', false)">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function downloadFile(f) {
            const r = await apiCall(`/files/download/${encodeURIComponent(f)}`);
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = f;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showRenameInput(f) {
            const div = document.getElementById(`actions-${f}`);
            div.innerHTML = `<input type="text" id="rename-input-${f}" class="rename-input" value="${f}">
                <button class="rename-confirm" onclick="renameFile('${f}')">Save</button>
                <button class="rename-cancel" onclick="cancelRename('${f}')">Cancel</button>`;
            document.getElementById(`rename-input-${f}`).focus();
        }
        async function cancelRename(f) { await loadFiles(); }
        async function renameFile(oldF) {
            const newF = document.getElementById(`rename-input-${oldF}`).value;
            if (!newF || newF === oldF) { await loadFiles(); return; }
            try {
                const r = await apiCall(`/files/rename/${encodeURIComponent(oldF)}?new_filename=${encodeURIComponent(newF)}`, { method: 'PUT' });
                if (r.ok) { await loadFiles(); await loadTrash(); }
                else alert('Error renaming');
            } catch(e) { alert('Error'); }
        }

        async function loadTrash() {
            try {
                const r = await apiCall('/files/trash');
                const files = await r.json();
                const container = document.getElementById('trash-container');
                if (files.length === 0) { container.innerHTML = '<div class="empty-state">Trash bin is empty</div>'; return; }
                container.innerHTML = files.map(f => `
                    <div class="file-item">
                        <div class="file-name">${escapeHtml(f.name)}</div>
                        <div class="file-size">${formatFileSize(f.size)}</div>
                        <div class="file-actions">
                            <button class="btn-action btn-restore" onclick="restoreFile('${escapeHtml(f.name)}')">Restore</button>
                            <button class="btn-action btn-delete" onclick="deleteFile('${escapeHtml(f.name)}', true)">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function uploadFiles() {
            const files = document.getElementById('fileInput').files;
            if (!files.length) { alert('Select files'); return; }
            for (let file of files) {
                const fd = new FormData(); fd.append('file', file);
                await apiCall('/files/upload', { method: 'POST', body: fd });
            }
            alert('Uploaded'); document.getElementById('fileInput').value = ''; loadFiles();
        }

        function viewFile(f) { (f.split('.').pop().toLowerCase() === 'pdf') ? downloadFile(f) : window.location.href = `/editor/${f}`; }
        function editFile(f) { (f.split('.').pop().toLowerCase() === 'pdf') ? downloadFile(f) : window.location.href = `/editor/${f}`; }
        async function shareFile(f) {
            try {
                const r = await apiCall(`/files/${f}/share`, { method: 'POST' });
                const d = await r.json();
                prompt('Share link:', window.location.origin + d.share_link);
            } catch(e) { alert('Error'); }
        }
        async function deleteFile(f, perm) {
            if (!confirm(`Delete ${f}?`)) return;
            await apiCall(`/files/${f}?permanent=${perm}`, { method: 'DELETE' });
            loadFiles(); loadTrash();
        }
        async function restoreFile(f) {
            await apiCall(`/files/${f}/restore`, { method: 'POST' });
            loadFiles(); loadTrash();
        }

        function showTab(tab) {
            document.getElementById('files-tab').style.display = tab === 'files' ? 'block' : 'none';
            document.getElementById('trash-tab').style.display = tab === 'trash' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((btn, i) => {
                if (i === 0) tab === 'files' ? btn.classList.add('active') : btn.classList.remove('active');
                else tab === 'trash' ? btn.classList.add('active') : btn.classList.remove('active');
            });
            loadFiles(); if (tab === 'trash') loadTrash();
        }

        function formatFileSize(b) {
            if (b === 0) return '0 Bytes';
            const k = 1024, sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(b) / Math.log(k));
            return parseFloat((b / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        async function logout() {
            await apiCall('/logout', { method: 'POST' });
            localStorage.clear();
            window.location.href = '/login-page';
        }
        loadFiles();
    </script>
</body>
</html>
