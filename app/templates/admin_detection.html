<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEBA · Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef2f7;
            font-family: 'Inter', sans-serif;
            color: #0a1c2a;
            line-height: 1.45;
        }
        .header {
            background: #ffffff;
            border-bottom: 2px solid #dce5ec;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #1a5a7a, #2c7da0);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon span { color: white; font-size: 1.3rem; font-weight: 700; }
        .logo-text .primary { font-size: 1.4rem; font-weight: 800; color: #1a5a7a; }
        .logo-text .secondary { font-size: 0.6rem; font-weight: 600; color: #8aaec2; text-transform: uppercase; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f0f4f8;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
            border-radius: 2rem;
            border: 1px solid #dce5ec;
        }
        .user-name { font-size: 0.85rem; font-weight: 600; color: #1a5a7a; }
        .btn-logout {
            background: #e2edf2;
            border: none;
            border-radius: 2rem;
            padding: 0.45rem 1.3rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a5a7a;
            cursor: pointer;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 2rem; }
        .control-bar {
            background: #ffffff;
            border: 1px solid #dce5ec;
            border-radius: 1rem;
            padding: 0.7rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .btn-primary {
            background: #1a5a7a;
            border: none;
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        .btn-primary:hover { background: #2c7da0; }
        .btn-outline {
            background: #f0f4f8;
            border: 1px solid #dce5ec;
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a5a7a;
            cursor: pointer;
        }
        .status-text { font-size: 0.75rem; color: #8aaec2; }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #dce5ec;
            padding-bottom: 0.5rem;
        }
        .tab {
            background: none;
            border: none;
            padding: 0.5rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #8aaec2;
            cursor: pointer;
            border-radius: 2rem;
        }
        .tab:hover, .tab.active { color: #1a5a7a; background: #f0f6fa; }
        .card {
            background: #ffffff;
            border: 1px solid #dce5ec;
            border-radius: 1.25rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #eef2f7;
            background: #fafcfd;
        }
        .card-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #8aaec2;
        }
        .card-title strong { color: #1a5a7a; }
        .card-body { padding: 1.25rem 1.5rem; }
        .stat-grid { display: flex; gap: 2rem; flex-wrap: wrap; }
        .stat-item { flex: 1; min-width: 120px; }
        .stat-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: #8aaec2; margin-bottom: 0.25rem; }
        .stat-number { font-size: 1.25rem; font-weight: 700; color: #1a5a7a; }
        .stat-number-small { font-size: 0.9rem; font-weight: 600; color: #1a5a7a; }
        .badge-group { display: flex; flex-wrap: wrap; gap: 0.3rem; }
        .table-wrapper { overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .data-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            font-weight: 600;
            color: #5e7e96;
            border-bottom: 1px solid #eef2f7;
        }
        .data-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eef2f7;
            color: #2c4e6e;
        }
        .data-table tr:hover td { background: #fafcfd; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .badge-data-theft { background: #fee6e3; color: #b33c2a; }
        .badge-directory { background: #eee5fc; color: #5e3a8c; }
        .badge-login { background: #e2edfa; color: #2a6d9c; }
        .badge-off-hours { background: #ddf3f0; color: #2a6e6a; }
        .badge-unknown { background: #eef2f5; color: #5e7e96; }
        .badge-success { background: #e0f0ea; color: #2a7a5c; }
        .badge-warning { background: #fef3e0; color: #c9771e; }
        .badge-info { background: #e2edfa; color: #2a6d9c; }
        .badge-isolation-only { background: #fef3e0; color: #c9771e; }
        .confidence-high { background: #1a5a7a; color: white; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.65rem; display: inline-block; }
        .confidence-medium { background: #e6a157; color: white; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.65rem; display: inline-block; }
        .confidence-low { background: #b33c2a; color: white; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.65rem; display: inline-block; }
        .empty-message { text-align: center; padding: 2rem; color: #a9c0cf; font-size: 0.8rem; }
        .divider { height: 1px; background: #eef2f7; margin: 1rem 0; }
        .access-denied { text-align: center; padding: 2.5rem; background: white; border-radius: 1rem; border: 1px solid #dce5ec; }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .stat-grid { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon"><span>☁</span></div>
                <div class="logo-text"><div class="primary">UEBA</div><div class="secondary">detection</div></div>
            </div>
            <div class="user-info">
                <span class="user-name" id="username"></span>
                <button class="btn-logout" onclick="logout()">Sign out</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="control-bar">
            <div>
                <button id="analyzeTodayBtn" class="btn-primary">Analyze Today</button>
                <button id="refreshBtn" class="btn-outline">Refresh</button>
            </div>
            <span id="statusText" class="status-text">Ready</span>
        </div>

        <div class="tabs">
            <button class="tab active" data-user="alice">Alice</button>
            <button class="tab" data-user="bob">Bob</button>
        </div>

        <div id="alicePanel">
            <div class="card">
                <div class="card-header"><div class="card-title"><strong>Today</strong> · Cumulative</div></div>
                <div class="card-body" id="todayAlice"><div class="empty-message">Loading...</div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title"><strong>Yesterday</strong> · Final</div></div>
                <div class="card-body" id="yesterdayAlice"><div class="empty-message">Loading...</div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title"><strong>Historical</strong> · Previous Detections</div></div>
                <div class="card-body" id="historicalAlice"><div class="empty-message">Loading...</div></div>
            </div>
        </div>

        <div id="bobPanel" style="display:none;">
            <div class="card">
                <div class="card-header"><div class="card-title"><strong>Today</strong> · Cumulative</div></div>
                <div class="card-body" id="todayBob"><div class="empty-message">Loading...</div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title"><strong>Yesterday</strong> · Final</div></div>
                <div class="card-body" id="yesterdayBob"><div class="empty-message">Loading...</div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title"><strong>Historical</strong> · Previous Detections</div></div>
                <div class="card-body" id="historicalBob"><div class="empty-message">Loading...</div></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        
        if (!token) window.location.href = '/login-page';
        document.getElementById('username').innerText = localStorage.getItem('user') || 'Admin';
        
        if (role !== 'admin') {
            document.body.innerHTML = '<div class="container"><div class="access-denied"><h1>Access Denied</h1><p>Admin privileges required.</p></div></div>';
        }

        let currentUser = 'alice';

        function formatDate(d) { return d ? new Date(d).toLocaleDateString() : '—'; }
        function formatTime(ts) { return ts ? new Date(ts).toLocaleTimeString() : '—'; }

        function getBadgeClass(t) {
            if (!t || t === 'NONE') return 'badge-unknown';
            if (t === 'DATA_THEFT') return 'badge-data-theft';
            if (t === 'DIRECTORY_TRAVERSAL') return 'badge-directory';
            if (t === 'LOGIN_ACTIVITY') return 'badge-login';
            if (t === 'OFF_HOURS') return 'badge-off-hours';
            if (t === 'ISOLATION_ONLY') return 'badge-isolation-only';
            if (t === 'BOT_OR_MASS_ACTIVITY') return 'badge-warning';
            if (t === 'MASS_ACTIVITY') return 'badge-warning';
            if (t === 'DIVERSE_ACTIVITY') return 'badge-info';
            if (t === 'PATH_REUSE_ANOMALY') return 'badge-info';
            return 'badge-unknown';
        }

        function getConfidenceClass(c) {
            if (c === 'HIGH') return 'confidence-high';
            if (c === 'MEDIUM') return 'confidence-medium';
            return 'confidence-low';
        }

        async function apiCall(url, options = {}) {
            const r = await fetch(url, {
                ...options,
                headers: { ...options.headers, 'Authorization': 'Bearer ' + token }
            });
            if (r.status === 401) { localStorage.clear(); window.location.href = '/login-page'; }
            return r.json();
        }

        async function loadPage() {
            const statusSpan = document.getElementById('statusText');
            statusSpan.innerText = 'Loading...';
            
            // Load today
            const today = await apiCall(`/admin/detection/today/cumulative/${currentUser}`);
            const todayDiv = document.getElementById(`today${currentUser.charAt(0).toUpperCase() + currentUser.slice(1)}`);
            
            if (today && today.has_data) {
                let flaggedHtml = '';
                if (today.flagged) {
                    // Show all attack types
                    let allTypesHtml = '';
                    if (today.all_attack_types && today.all_attack_types.length > 0) {
                        allTypesHtml = `
                            <div class="stat-item">
                                <div class="stat-label">All Types</div>
                                <div class="badge-group">
                                    ${today.all_attack_types.map(t => `<span class="badge ${getBadgeClass(t)}">${t}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    flaggedHtml = `
                        <div class="stat-grid" style="margin-top: 1rem;">
                            <div class="stat-item">
                                <div class="stat-label">Primary Attack</div>
                                <div><span class="badge ${getBadgeClass(today.attack_type)}">${today.attack_type || 'Unknown'}</span></div>
                            </div>
                            ${allTypesHtml}
                            <div class="stat-item">
                                <div class="stat-label">Baseline Score</div>
                                <div class="stat-number-small">${today.baseline_score?.toFixed(2) || '0'}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">Isolation Forest</div>
                                <div class="stat-number-small">${today.flagged_by_isolation ? 'Flagged' : 'Clean'}</div>
                            </div>
                        </div>
                        ${today.verification ? `<div class="divider"></div><div style="font-size:0.7rem; color:#5e7e96;">${today.verification}</div>` : ''}
                        ${today.analyst_note ? `<div style="margin-top:0.5rem; font-size:0.7rem; color:#c9771e;">${today.analyst_note}</div>` : ''}
                    `;
                }
                todayDiv.innerHTML = `
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-label">Cumulative Until</div>
                            <div class="stat-number-small">${formatTime(today.cumulative_until)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Events Today</div>
                            <div class="stat-number">${today.total_events || 0}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Status</div>
                            <div><span class="badge ${today.flagged ? 'badge-data-theft' : 'badge-success'}">${today.flagged ? 'Flagged' : 'Clean'}</span></div>
                        </div>
                    </div>
                    ${flaggedHtml}
                `;
            } else {
                todayDiv.innerHTML = '<div class="empty-message">No data for today</div>';
            }
            
            // Load yesterday
            const yesterday = await apiCall(`/admin/detection/yesterday/${currentUser}`);
            const yesterdayDiv = document.getElementById(`yesterday${currentUser.charAt(0).toUpperCase() + currentUser.slice(1)}`);
            
            if (yesterday && yesterday.analyzed) {
                yesterdayDiv.innerHTML = `
                    <div class="stat-grid">
                        <div class="stat-item"><div class="stat-label">Date</div><div class="stat-number-small">${formatDate(yesterday.date)}</div></div>
                        <div class="stat-item"><div class="stat-label">Attack Type</div><div><span class="badge ${getBadgeClass(yesterday.attack_type)}">${yesterday.attack_type || 'None'}</span></div></div>
                        <div class="stat-item"><div class="stat-label">Confidence</div><div><span class="${getConfidenceClass(yesterday.confidence)}">${yesterday.confidence || 'LOW'}</span></div></div>
                        <div class="stat-item"><div class="stat-label">Score</div><div class="stat-number-small">${yesterday.baseline_score?.toFixed(2) || '0'}</div></div>
                    </div>
                    ${yesterday.analyst_notes ? `<div class="divider"></div><div style="font-size:0.7rem;">${yesterday.analyst_notes}</div>` : ''}
                `;
            } else {
                yesterdayDiv.innerHTML = '<div class="empty-message">No anomalies detected - day was clean</div>';
            }
            
            // Load historical
            const history = await apiCall(`/admin/detection/history/${currentUser}?days_back=30`);
            const historyDiv = document.getElementById(`historical${currentUser.charAt(0).toUpperCase() + currentUser.slice(1)}`);
            
            if (history && history.length > 0) {
                let html = `<div class="table-wrapper"><table class="data-table"><thead>
                    <tr>
                        <th>Date</th>
                        <th>Primary Attack</th>
                        <th>All Types</th>
                        <th>Confidence</th>
                        <th>Score</th>
                        <th>Notes</th>
                    </tr>
                </thead><tbody>`;
                
                for (const row of history) {
                    // Extract all types from analyst_notes
                    let allTypesHtml = '';
                    let notesContent = row.analyst_notes || '—';
                    
                    const bracketMatch = notesContent.match(/\[([^\]]+)\]/);
                    if (bracketMatch) {
                        const types = bracketMatch[1].split(' + ');
                        allTypesHtml = `<div class="badge-group">${types.map(t => `<span class="badge ${getBadgeClass(t)}">${t}</span>`).join('')}</div>`;
                        notesContent = notesContent.replace(/\[[^\]]+\]\s*/, '');
                    } else if (row.attack_type && row.attack_type !== 'NONE') {
                        allTypesHtml = `<span class="badge ${getBadgeClass(row.attack_type)}">${row.attack_type}</span>`;
                    } else {
                        allTypesHtml = '<span class="badge badge-unknown">—</span>';
                    }
                    
                    html += `<tr>
                        <td>${formatDate(row.date)}</span></td>
                        <td><span class="badge ${getBadgeClass(row.attack_type)}">${row.attack_type || 'Unknown'}</span></td>
                        <td>${allTypesHtml}</td>
                        <td><span class="${getConfidenceClass(row.confidence)}">${row.confidence || 'LOW'}</span></td>
                        <td>${row.baseline_score?.toFixed(2) || '0'}</td>
                        <td style="max-width: 250px; font-size: 0.7rem;">${notesContent.substring(0, 80)}${notesContent.length > 80 ? '...' : ''}</td>
                    </tr>`;
                }
                html += `</tbody></table></div>`;
                historyDiv.innerHTML = html;
            } else {
                historyDiv.innerHTML = '<div class="empty-message">No historical anomalies recorded</div>';
            }
            
            statusSpan.innerText = `Updated at ${new Date().toLocaleTimeString()}`;
        }

        async function triggerToday() {
            const statusSpan = document.getElementById('statusText');
            statusSpan.innerText = 'Analyzing today...';
            await apiCall('/admin/detection/today/trigger', { method: 'POST' });
            await loadPage();
        }

        function switchUser(user) {
            currentUser = user;
            document.getElementById('alicePanel').style.display = user === 'alice' ? 'block' : 'none';
            document.getElementById('bobPanel').style.display = user === 'bob' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(btn => {
                if (btn.getAttribute('data-user') === user) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            loadPage();
        }

        async function logout() {
            await fetch('/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
            localStorage.clear();
            window.location.href = '/login-page';
        }

        document.getElementById('analyzeTodayBtn').addEventListener('click', triggerToday);
        document.getElementById('refreshBtn').addEventListener('click', loadPage);
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => switchUser(btn.getAttribute('data-user')));
        });

        setInterval(loadPage, 60000);
        loadPage();
    </script>
</body>
</html>
