<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f4f8; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        h1, h2, h3 { color: #2c7da0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #2c7da0; color: white; }
        .high { background: #6a0dad; color: white; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .medium { background: #f0a500; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .data-theft { color: #c0392b; font-weight: bold; }
        .directory { color: #8e44ad; font-weight: bold; }
        .login { color: #2980b9; font-weight: bold; }
        .off-hours { color: #16a085; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #e2e8f0; border: none; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: #2c7da0; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .loading { text-align: center; padding: 40px; color: #6c86a0; }
        .access-denied { text-align: center; margin-top: 100px; }
        .access-denied h1 { color: #c0392b; }
        .alert { background: #ffe0e0; border-left: 4px solid #c0392b; padding: 10px; margin: 5px 0; }
        .alert-warning { background: #fff0e0; border-left: 4px solid #e67e22; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-stable { background: #27ae60; color: white; }
        .badge-instable { background: #e67e22; color: white; }
        .section { margin-top: 30px; border-top: 2px solid #ddd; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UEBA Detection Dashboard</h1>
        <a href="/admin/database">← Back to Admin</a>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('alice')">Alice (Consistent)</button>
            <button class="tab-btn" onclick="showTab('bob')">Bob (Inconsistent)</button>
        </div>
        
        <div id="alice-tab" class="tab-content active">
            <h2>Alice - Daily Anomalies</h2>
            <div id="alice-stats"></div>
            <div id="alice-table"></div>
            <div id="alice-rare"></div>
        </div>
        
        <div id="bob-tab" class="tab-content">
            <h2>Bob - Daily Anomalies</h2>
            <div id="bob-stats"></div>
            <div id="bob-table"></div>
            <div id="bob-rare"></div>
        </div>
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        
        if (!token) window.location.href = '/login-page';
        if (role !== 'admin') {
            document.body.innerHTML = '<div class="access-denied"><h1>Accès refusé</h1><p>Vous devez être administrateur.</p><a href="/dashboard">Retour</a></div>';
        }
        
        function getAttackClass(attack) {
            if (attack === 'DATA_THEFT') return 'data-theft';
            if (attack === 'DIRECTORY_TRAVERSAL') return 'directory';
            if (attack === 'LOGIN_ACTIVITY') return 'login';
            if (attack === 'OFF_HOURS') return 'off-hours';
            return 'unknown';
        }
        
        function renderStats(data) {
            if (data.error) return '<p style="color:red;">Error: ' + data.error + '</p>';
            return '<p><strong>Total days analyzed:</strong> ' + data.total_days + '</p>' +
                   '<p><strong>Flagged days:</strong> ' + data.flagged_days + '</p>';
        }
        
        function renderTable(data) {
            if (data.error || !data.results) return '<p>No data available</p>';
            var flagged = data.results.filter(function(r) { return r.anomaly_score > 0; });
            if (flagged.length === 0) return '<p>No anomalies detected</p>';
            var html = '<table><thead><tr><th>Date</th><th>Score</th><th>Attack Type</th><th>Confidence</th><th>IF Flagged</th><th>Verification</th><th>Top Contributors</th></tr></thead><tbody>';
            for (var i = 0; i < flagged.length; i++) {
                var row = flagged[i];
                var verif = [];
                if (row.data_theft_verification) verif.push('DATA_THEFT: ' + row.data_theft_verification);
                if (row.login_verification) verif.push('LOGIN: ' + row.login_verification);
                html += '<tr><td>' + row.date + '</td><td>' + row.anomaly_score.toFixed(4) + '</td><td class="' + getAttackClass(row.attack_type) + '">' + row.attack_type + '</td><td><span class="' + (row.confidence === 'HIGH' ? 'high' : 'medium') + '">' + row.confidence + '</span></td><td>' + (row.if_flagged ? '✅' : '—') + '</td><td>' + (verif.join('; ') || '—') + '</td><td style="font-size:0.85em;">' + row.top_contributors + '</td></tr>';
            }
            html += '</tbody></table>';
            return html;
        }
        
        function renderRareEvents(data) {
            if (data.error) return '<p style="color:red;">Error: ' + data.error + '</p>';
            
            var badgeClass = data.profile === 'stable' ? 'badge-stable' : 'badge-instable';
            var profileText = data.profile === 'stable' ? 'Stable (x2)' : 'Instable (x3)';
            
            var html = '<div class="section"><h3>Phase 2 - Real-time Anomaly Detection (Sliding Windows)</h3>';
            html += '<p><span class="badge ' + badgeClass + '">' + profileText + '</span> (multiplier x' + data.multiplier + ')</p>';
            
            // Ransomware alerts
            html += '<h4>🚨 Ransomware (file_written / 1 min)</h4>';
            if (data.anomalies.ransomware.length === 0) {
                html += '<p class="alert">No ransomware anomalies detected</p>';
            } else {
                for (var i = 0; i < data.anomalies.ransomware.length; i++) {
                    var a = data.anomalies.ransomware[i];
                    html += '<div class="alert"><strong>' + a.time + '</strong> - ' + a.count + ' file_written (threshold: ' + a.threshold + ', x' + a.multiplier + ')</div>';
                }
            }
            
            // Mass deletion alerts
            html += '<h4>🗑️ Mass Deletion (file_deleted / 5 min)</h4>';
            if (data.anomalies.mass_deletion.length === 0) {
                html += '<p>No mass deletion anomalies detected</p>';
            } else {
                for (var i = 0; i < data.anomalies.mass_deletion.length; i++) {
                    var a = data.anomalies.mass_deletion[i];
                    html += '<div class="alert"><strong>' + a.time + '</strong> - ' + a.count + ' file_deleted (threshold: ' + a.threshold + ', x' + a.multiplier + ')</div>';
                }
            }
            
            // Malicious upload alerts
            html += '<h4>📤 Malicious Upload (file_created / 5 min)</h4>';
            if (data.anomalies.malicious_upload.length === 0) {
                html += '<p>No malicious upload anomalies detected</p>';
            } else {
                for (var i = 0; i < data.anomalies.malicious_upload.length; i++) {
                    var a = data.anomalies.malicious_upload[i];
                    html += '<div class="alert"><strong>' + a.time + '</strong> - ' + a.count + ' file_created (threshold: ' + a.threshold + ', x' + a.multiplier + ')</div>';
                }
            }
            
            // Account takeover alerts
            html += '<h4>🔐 Account Takeover (file_accessed after login / 1 min)</h4>';
            if (data.anomalies.account_takeover.length === 0) {
                html += '<p>No account takeover anomalies detected</p>';
            } else {
                for (var i = 0; i < data.anomalies.account_takeover.length; i++) {
                    var a = data.anomalies.account_takeover[i];
                    html += '<div class="alert"><strong>After login at ' + a.login_time + '</strong> - ' + a.count + ' file_accessed (threshold: ' + a.threshold + ', x' + a.multiplier + ')</div>';
                }
            }
            
            
            
            return html;
        }
        
        async function loadData(user) {
            var statsDiv = document.getElementById(user + '-stats');
            var tableDiv = document.getElementById(user + '-table');
            var rareDiv = document.getElementById(user + '-rare');
            
            statsDiv.innerHTML = '<div class="loading">Loading...</div>';
            tableDiv.innerHTML = '';
            rareDiv.innerHTML = '';
            
            try {
                var response = await fetch('/admin/detection/' + user, { headers: { 'Authorization': 'Bearer ' + token } });
                var data = await response.json();
                statsDiv.innerHTML = renderStats(data);
                tableDiv.innerHTML = renderTable(data);
            } catch(e) { statsDiv.innerHTML = '<p style="color:red;">Error loading data</p>'; }
            
            try {
                var rareResponse = await fetch('/admin/detection/rare/' + user, { headers: { 'Authorization': 'Bearer ' + token } });
                var rareData = await rareResponse.json();
                rareDiv.innerHTML = renderRareEvents(rareData);
            } catch(e) { rareDiv.innerHTML = '<p style="color:red;">Error loading rare events</p>'; }
        }
        
        function showTab(tab) {
            var btns = document.querySelectorAll('.tab-btn');
            for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
            var contents = document.querySelectorAll('.tab-content');
            for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
            var activeBtn = document.querySelector('.tab-btn[onclick="showTab(\'' + tab + '\')"]');
            if (activeBtn) activeBtn.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            loadData(tab);
        }
        
        loadData('alice');
    </script>
</body>
</html>
