<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEBA · Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef2f7;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #0a1c2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        /* Clouds flottants dans l'arrière-plan */
        .bg-cloud {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .cloud-1 { top: 5%; left: -40px; width: 200px; transform: rotate(-5deg); }
        .cloud-2 { bottom: 10%; right: -30px; width: 260px; transform: rotate(3deg); }
        .cloud-3 { top: 20%; right: 10%; width: 140px; opacity: 0.2; transform: rotate(8deg); }
        .cloud-4 { bottom: 25%; left: 5%; width: 170px; opacity: 0.25; transform: rotate(-6deg); }
        .cloud-5 { top: 60%; left: 15%; width: 100px; opacity: 0.18; transform: rotate(12deg); }
        .cloud-6 { top: 40%; right: 20%; width: 120px; opacity: 0.22; transform: rotate(-8deg); }
        
        .login-container {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 440px;
            margin: 2rem;
            overflow: hidden;
            border: 1px solid #dce5ec;
            position: relative;
            z-index: 10;
        }
        .header {
            background: linear-gradient(135deg, #1a5a7a, #2c7da0);
            padding: 2rem;
            text-align: center;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .logo-icon span { color: white; font-size: 1.8rem; font-weight: 700; }
        .header h1 { color: white; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 0.25rem; }
        .header p { color: rgba(255,255,255,0.75); font-size: 0.8rem; }
        .form-container { padding: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #1a5a7a;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #dce5ec;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: #ffffff;
        }
        input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: #1a5a7a;
            color: white;
            border: none;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: #2c7da0; transform: translateY(-1px); }
        .demo-credentials {
            background: #f8fafc;
            border-radius: 0.75rem;
            padding: 0.75rem;
            margin-top: 1.25rem;
            font-size: 0.7rem;
            color: #5e7e96;
            border: 1px solid #eef2f7;
            text-align: center;
        }
        .demo-credentials p { margin: 0.2rem 0; }
        .demo-credentials strong { color: #1a5a7a; }
        .register-link {
            text-align: center;
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid #eef2f7;
        }
        .register-link a { color: #2c7da0; text-decoration: none; font-weight: 600; font-size: 0.8rem; }
        .register-link a:hover { text-decoration: underline; }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            text-align: center;
        }
        .error { background: #fee6e3; color: #b33c2a; border: 1px solid #fdd8d4; }
        .success { background: #e0f0ea; color: #2a7a5c; border: 1px solid #cce8dd; }
        
        @media (max-width: 768px) {
            .bg-cloud { opacity: 0.15; }
            .cloud-1, .cloud-2 { width: 150px; }
            .cloud-3, .cloud-4, .cloud-5, .cloud-6 { width: 90px; }
        }
    </style>
</head>
<body>
    <!-- Clouds décoratifs dans l'arrière-plan -->
    <img src="/static/cloud.webp" alt="" class="bg-cloud cloud-1">
    <img src="/static/cloud.webp" alt="" class="bg-cloud cloud-2">
    <img src="/static/cloud.webp" alt="" class="bg-cloud cloud-3">
    <img src="/static/cloud.webp" alt="" class="bg-cloud cloud-4">
    <img src="/static/cloud.webp" alt="" class="bg-cloud cloud-5">
    <img src="/static/cloud.webp" alt="" class="bg-cloud cloud-6">

    <div class="login-container">
        <div class="header">
            <div class="logo-icon"><span>☁</span></div>
            <h1>Welcome back</h1>
            <p>Sign in to your account</p>
        </div>
        <div class="form-container">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Sign in</button>
                <div class="demo-credentials">
                    <p><strong>Demo accounts</strong></p>
                    <p>alice / password123 &nbsp;|&nbsp; bob / password456</p>
                </div>
                <div class="register-link">
                    <a href="/register-page">Create an account →</a>
                </div>
                <div id="message" class="message" style="display:none;"></div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            messageDiv.style.display = 'none';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', username);
                    localStorage.setItem('uid', data.uid);
                    localStorage.setItem('role', data.role);
                    window.location.href = '/dashboard';
                } else {
                    messageDiv.textContent = data.detail || 'Invalid credentials';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
