<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - UEBA Cloud Storage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            margin: 20px;
            overflow: hidden;
        }
        .header {
            background: #2c7da0;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; font-weight: 600; }
        .header p { font-size: 14px; opacity: 0.9; }
        .form-container { padding: 40px; }
        .form-group { margin-bottom: 24px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #1a3a5c;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d0dbe8;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #2c7da0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-login:hover { background: #1f5e7a; }
        .register-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .register-link a { color: #2c7da0; text-decoration: none; font-weight: 500; }
        .register-link a:hover { text-decoration: underline; }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        .error { background: #fee; color: #c0392b; border: 1px solid #fcc; }
        .success { background: #e8f8f5; color: #1e8449; border: 1px solid #a3e4d7; }
        .demo-credentials {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-size: 12px;
            color: #5a6e7c;
            border: 1px solid #e2e8f0;
        }
        .demo-credentials p { margin: 4px 0; }
        .demo-credentials strong { color: #2c7da0; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>Welcome Back</h1>
            <p>Sign in to access your secure cloud storage</p>
        </div>
        <div class="form-container">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
                <div class="demo-credentials">
                    <p><strong>Demo Accounts</strong></p>
                    <p>Username: alice | Password: password123</p>
                    <p>Username: bob | Password: password456</p>
                </div>
                <div class="register-link">
                    Don't have an account? <a href="/register-page">Create Account</a>
                </div>
                <div id="message" class="message" style="display:none;"></div>
            </form>
        </div>
    </div>
    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            messageDiv.style.display = 'none';
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', username);
                    localStorage.setItem('uid', data.uid);
                    localStorage.setItem('role', data.role);
                    window.location.href = '/dashboard';
                } else {
                    messageDiv.textContent = data.detail || 'Invalid credentials';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
